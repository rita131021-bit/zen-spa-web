      window.zenTrack = function(eventName, params) {

      };

      document.addEventListener('click', function(event) {
        var target = event.target && event.target.closest ? event.target.closest('a, button') : null;
        if (!target || !window.zenTrack) return;
        var text = (target.innerText || target.getAttribute('aria-label') || target.title || '').trim().toLowerCase();
        var href = target.getAttribute('href') || '';
        if (href.indexOf('wa.me') >= 0 || text.indexOf('whatsapp') >= 0) window.zenTrack('click_whatsapp');
        if (text.indexOf('reservar') >= 0 || text.indexOf('reserva') >= 0) window.zenTrack('click_reservar');
        if (text.indexOf('chat') >= 0 || target.getAttribute('aria-label') === 'Abrir chat') window.zenTrack('click_chat_online');
      }, true);

      document.addEventListener('submit', function(event) {
        if (window.zenTrack) window.zenTrack('formulario_enviado', { form_id: event.target && event.target.id ? event.target.id : 'sin_id' });
      }, true);
